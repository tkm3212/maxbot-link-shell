<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Links</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #9fb0c8;
      --accent: #2d6cdf;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
    }
    body {
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    h1 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      max-width: 560px;
      margin: 0 auto;
    }
    .grid.cols-1 { grid-template-columns: 1fr; }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    button.tile {
      border: none;
      border-radius: 16px;
      background: var(--card);
      color: var(--text);
      padding: 16px 8px;
      min-height: 116px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      transition: transform 0.12s ease;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    button.tile:active { transform: scale(0.98); }
    button.tile:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .emoji { font-size: 2.1rem; line-height: 1; }
    .label {
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.25;
      hyphens: auto;
    }
    .err, .empty {
      text-align: center;
      font-size: 0.9rem;
      max-width: 420px;
      margin: 24px auto;
      line-height: 1.45;
    }
    .err { color: #f0a0a0; }
    .empty { color: var(--muted); }
    @media (max-width: 360px) {
      body { padding: 12px; }
      .grid { gap: 8px; }
      button.tile { min-height: 104px; padding: 14px 6px; border-radius: 14px; }
      .emoji { font-size: 1.8rem; }
      .label { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <h1 id="title">…</h1>
  <div class="grid" id="grid" hidden></div>
  <p class="err" id="err" hidden></p>
  <p class="empty" id="empty" hidden></p>
  <script>
    (function () {
      var app = window.WebApp;
      if (app) {
        try {
          if (typeof app.ready === "function") app.ready();
          if (typeof app.expand === "function") app.expand();
        } catch (e) {}
      }

      function openUrl(url) {
        if (app && typeof app.openLink === "function") {
          app.openLink(url);
          return;
        }
        window.open(url, "_blank", "noopener,noreferrer");
      }

      function setGridCols(grid, n) {
        grid.classList.remove("cols-1", "cols-2");
        if (n <= 1) grid.classList.add("cols-1");
        else if (n === 2) grid.classList.add("cols-2");
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function showError(msg) {
        document.getElementById("title").textContent = "Links";
        document.getElementById("grid").hidden = true;
        document.getElementById("empty").hidden = true;
        var err = document.getElementById("err");
        err.textContent = msg;
        err.hidden = false;
      }

      function showEmpty(title) {
        document.getElementById("title").textContent = title || "Links";
        document.getElementById("grid").hidden = true;
        document.getElementById("err").hidden = true;
        var empty = document.getElementById("empty");
        empty.textContent = "No entries.";
        empty.hidden = false;
      }

      function render(data) {
        var items = data.items || [];
        var titleEl = document.getElementById("title");
        var grid = document.getElementById("grid");
        var err = document.getElementById("err");
        var emptyEl = document.getElementById("empty");
        if (items.length === 0) {
          showEmpty(data.title);
          return;
        }
        titleEl.textContent = data.title || "Links";
        setGridCols(grid, Math.min(3, items.length));
        grid.innerHTML = "";
        items.forEach(function (item) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "tile";
          btn.setAttribute("aria-label", item.label);
          btn.innerHTML =
            '<span class="emoji" aria-hidden="true">' +
            (item.icon || "🔗") +
            "</span>" +
            '<span class="label">' +
            escapeHtml(item.label) +
            "</span>";
          btn.addEventListener("click", function () {
            openUrl(item.url);
          });
          grid.appendChild(btn);
        });
        grid.hidden = false;
        err.hidden = true;
        emptyEl.hidden = true;
      }

      fetch("links.json?v=" + String(Date.now()), { cache: "no-store" })
        .then(function (r) {
          if (!r.ok) throw new Error("load");
          return r.json();
        })
        .then(render)
        .catch(function () {
          showError("Could not load configuration.");
        });
    })();
  </script>
</body>
</html>
